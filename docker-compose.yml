# =============================================================================
# Primary local backend: self-hosted Appwrite (vendored under infra/appwrite/).
# Same stack pattern you can run on a VPS; this file is the local entrypoint.
# Traefik exposes HTTP on host port 8080 → Appwrite API/Console (e.g. /v1).
# Orientation: docs/ENTWICKLER_HANDBUCH.md, infra/appwrite/README.md
#
# First run:
#   cp infra/appwrite/.env.example infra/appwrite/.env
#   # edit secrets (_APP_DB_*, _APP_OPENSSL_KEY_V1, etc.)
#
# Start:  docker compose --env-file infra/appwrite/.env up -d
# Stop:   docker compose down
#
# Legacy Postgres + Hasura console + Lucia auth:
#   docker compose -f docker-compose.legacy.yml --profile local-dev up -d --build
#   npm run docker:local-dev:up
# =============================================================================

name: scriptony

include:
  - path: infra/appwrite/docker-compose.yml

services:
  # ── Scriptony Local Bridge ──────────────────────────────────────────────
  # Connects Appwrite Realtime → ComfyUI + Blender (both on host).
  # Internal Docker network for Appwrite; host.docker.internal for host services.
  bridge:
    build:
      context: ./local-bridge
      dockerfile: Dockerfile
    container_name: scriptony-bridge
    restart: unless-stopped
    ports:
      - "9877:9877"
    environment:
      BRIDGE_APPWRITE_ENDPOINT: "http://appwrite:80/v1"
      BRIDGE_APPWRITE_PROJECT_ID: ${BRIDGE_APPWRITE_PROJECT_ID:-scriptony}
      BRIDGE_APPWRITE_API_KEY: ${BRIDGE_APPWRITE_API_KEY:-}
      BRIDGE_APPWRITE_DATABASE_ID: ${BRIDGE_APPWRITE_DATABASE_ID:-scriptony}
      BRIDGE_COMFYUI_URL: "http://host.docker.internal:8188"
      BRIDGE_BLENDER_URL: "http://host.docker.internal:9876"
      BRIDGE_HEALTH_PORT: "9877"
      BRIDGE_LOG_LEVEL: ${BRIDGE_LOG_LEVEL:-info}
    networks:
      - appwrite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - appwrite

  # ── Scriptony Frontend (Vite SPA via nginx) ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: scriptony-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - appwrite
    depends_on:
      - bridge
