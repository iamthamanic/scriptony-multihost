# CI: lint/typecheck/tests/build + validate Appwrite compose merge.
# Deploy: SSH to VPS — git pull + Appwrite stack (root docker-compose + infra/appwrite/.env).
#   Runs only when repo variable VPS_DEPLOY_ENABLED == 'true' (see docs/GITHUB_ACTIONS_DEPLOY.md).
# Optional: build static frontend and rsync (repo vars — see docs/GITHUB_ACTIONS_DEPLOY.md).
# Legacy Postgres/Lucia: docker-compose.legacy.yml — manual only, not used here.
name: scriptony CI/CD with Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose (Appwrite include merge)
        run: docker compose --env-file infra/appwrite/.env.example config --quiet

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Appwrite function dependencies
        run: cd functions && bun install

      - name: Run ESLint
        run: bun run lint || true
        continue-on-error: true

      - name: Run TypeScript check
        run: bun run typecheck

      - name: Run tests
        run: bun run test -- --passWithNoTests || true
        continue-on-error: true

      - name: Build
        env:
          # Dummy base URL so Vite production build can resolve function routes
          # without real Appwrite secrets. Runtime still uses actual env/config.
          VITE_BACKEND_API_BASE_URL: https://localhost
        run: bun run build

  deploy-prod:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.VPS_DEPLOY_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup Bun
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (static deploy)
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        run: bun install

      - name: Build production frontend
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        env:
          VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_FUNCTIONS_BASE_URL: ${{ secrets.VITE_APPWRITE_FUNCTIONS_BASE_URL }}
          VITE_BACKEND_API_BASE_URL: ${{ secrets.VITE_BACKEND_API_BASE_URL }}
          VITE_APP_WEB_URL: ${{ secrets.VITE_APP_WEB_URL }}
          VITE_AUTH_REDIRECT_URL: ${{ secrets.VITE_AUTH_REDIRECT_URL }}
          VITE_PASSWORD_RESET_REDIRECT_URL: ${{ secrets.VITE_PASSWORD_RESET_REDIRECT_URL }}
          VITE_BACKEND_PUBLIC_TOKEN: ${{ secrets.VITE_BACKEND_PUBLIC_TOKEN }}
        run: bun run build

      - name: Rsync static site to production server
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WEB_ROOT: ${{ vars.SCRIPTONY_WEB_ROOT_PROD }}
        run: |
          if [ -z "$WEB_ROOT" ]; then
            echo "Set repository variable SCRIPTONY_WEB_ROOT_PROD (e.g. /var/www/scriptony)"
            exit 1
          fi
          rsync -avz --delete -e "ssh -i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            build/ "${SSH_USER}@${SSH_HOST}:${WEB_ROOT}/"

      - name: Git sync on server (production)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_FULL: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            "REPO_FULL='${REPO_FULL}' APP_ROOT=/root/scriptony-prod BRANCH=main bash -s" <<'REMOTE'
          set -euo pipefail
          if [ ! -d "$APP_ROOT/.git" ]; then
            mkdir -p "$APP_ROOT"
            git clone -b "$BRANCH" "git@github.com:${REPO_FULL}.git" "$APP_ROOT"
          fi
          cd "$APP_ROOT"
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          echo "OK: git sync production"
          REMOTE

      - name: Write infra/appwrite/.env from GitHub Secret (production, optional)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APPWRITE_INFRA_ENV: ${{ secrets.APPWRITE_INFRA_ENV }}
        run: |
          if [ -n "${APPWRITE_INFRA_ENV}" ]; then
            echo "$APPWRITE_INFRA_ENV" | ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
              "mkdir -p /root/scriptony-prod/infra/appwrite && cat > /root/scriptony-prod/infra/appwrite/.env.tmp && mv /root/scriptony-prod/infra/appwrite/.env.tmp /root/scriptony-prod/infra/appwrite/.env && chmod 600 /root/scriptony-prod/infra/appwrite/.env"
            echo "OK: wrote /root/scriptony-prod/infra/appwrite/.env from secret APPWRITE_INFRA_ENV"
          else
            echo "APPWRITE_INFRA_ENV not set — using existing infra/appwrite/.env on server if present"
          fi

      - name: Appwrite Docker Compose up (production)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/scriptony-prod
          test -f infra/appwrite/.env || { echo "ERROR: Missing infra/appwrite/.env — set secret APPWRITE_INFRA_ENV or create file on server."; exit 1; }
          docker compose --env-file infra/appwrite/.env pull || true
          docker compose --env-file infra/appwrite/.env up -d
          docker image prune -f || true
          echo "OK: production Appwrite stack updated"
          REMOTE

  deploy-test:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push' && vars.VPS_DEPLOY_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup Bun
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (static deploy)
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        run: bun install

      - name: Build frontend (test/staging)
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        env:
          VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_FUNCTIONS_BASE_URL: ${{ secrets.VITE_APPWRITE_FUNCTIONS_BASE_URL }}
          VITE_BACKEND_API_BASE_URL: ${{ secrets.VITE_BACKEND_API_BASE_URL }}
          VITE_APP_WEB_URL: ${{ secrets.VITE_APP_WEB_URL }}
          VITE_AUTH_REDIRECT_URL: ${{ secrets.VITE_AUTH_REDIRECT_URL }}
          VITE_PASSWORD_RESET_REDIRECT_URL: ${{ secrets.VITE_PASSWORD_RESET_REDIRECT_URL }}
          VITE_BACKEND_PUBLIC_TOKEN: ${{ secrets.VITE_BACKEND_PUBLIC_TOKEN }}
        run: bun run build

      - name: Rsync static site to test server
        if: vars.DEPLOY_STATIC_FRONTEND == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WEB_ROOT: ${{ vars.SCRIPTONY_WEB_ROOT_TEST }}
        run: |
          if [ -z "$WEB_ROOT" ]; then
            echo "Set repository variable SCRIPTONY_WEB_ROOT_TEST (e.g. /var/www/scriptony-test)"
            exit 1
          fi
          rsync -avz --delete -e "ssh -i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            build/ "${SSH_USER}@${SSH_HOST}:${WEB_ROOT}/"

      - name: Git sync on server (test)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_FULL: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            "REPO_FULL='${REPO_FULL}' APP_ROOT=/root/scriptony-test BRANCH=develop bash -s" <<'REMOTE'
          set -euo pipefail
          if [ ! -d "$APP_ROOT/.git" ]; then
            mkdir -p "$APP_ROOT"
            git clone -b "$BRANCH" "git@github.com:${REPO_FULL}.git" "$APP_ROOT"
          fi
          cd "$APP_ROOT"
          git fetch origin
          git checkout "$BRANCH"
          git pull origin "$BRANCH"
          echo "OK: git sync test"
          REMOTE

      - name: Write infra/appwrite/.env from GitHub Secret (staging, optional)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APPWRITE_INFRA_ENV_STAGING: ${{ secrets.APPWRITE_INFRA_ENV_STAGING }}
        run: |
          if [ -n "${APPWRITE_INFRA_ENV_STAGING}" ]; then
            echo "$APPWRITE_INFRA_ENV_STAGING" | ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
              "mkdir -p /root/scriptony-test/infra/appwrite && cat > /root/scriptony-test/infra/appwrite/.env.tmp && mv /root/scriptony-test/infra/appwrite/.env.tmp /root/scriptony-test/infra/appwrite/.env && chmod 600 /root/scriptony-test/infra/appwrite/.env"
            echo "OK: wrote /root/scriptony-test/infra/appwrite/.env from secret APPWRITE_INFRA_ENV_STAGING"
          else
            echo "APPWRITE_INFRA_ENV_STAGING not set — using existing infra/appwrite/.env on test server if present"
          fi

      - name: Appwrite Docker Compose up (test)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/scriptony-test
          test -f infra/appwrite/.env || { echo "ERROR: Missing infra/appwrite/.env — set APPWRITE_INFRA_ENV_STAGING or create file on server."; exit 1; }
          docker compose --env-file infra/appwrite/.env pull || true
          docker compose --env-file infra/appwrite/.env up -d
          docker image prune -f || true
          echo "OK: test Appwrite stack updated"
          REMOTE
