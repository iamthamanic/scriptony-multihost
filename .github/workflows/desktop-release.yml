# Desktop release workflow — builds signed Tauri installers and publishes GitHub Release artifacts.
#
# Trigger: push tag `app-v*` (e.g. app-v0.1.3) or manual dispatch.
#
# Required GitHub secrets:
#   TAURI_SIGNING_PRIVATE_KEY — updater signatures (.sig, latest.json)
#   APPLE_CERTIFICATE (+ APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID) — macOS Gatekeeper + notarization
#
# See docs/DESKTOP_RELEASE.md and: npm run setup:apple-signing

name: Desktop Release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      KEYCHAIN_PASSWORD: scriptony-ci-keychain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add macOS cross-compilation target
        if: contains(matrix.args, 'x86_64-apple-darwin')
        run: rustup target add x86_64-apple-darwin

      - name: Import Apple Developer certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "::warning::APPLE_CERTIFICATE not set — macOS build will be ad-hoc signed."
            echo "Users must run: xattr -cr /Applications/Scriptony.app"
            echo "See docs/DESKTOP_RELEASE.md and: npm run setup:apple-signing"
            exit 0
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD is required when APPLE_CERTIFICATE is set"
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import "$CERT_PATH" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

          echo "Installed signing identities:"
          security find-identity -v -p codesigning build.keychain

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts
        env:
          HUSKY: "0"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Scriptony ${{ github.ref_name }}
          releaseBody: |
            ## Scriptony Desktop

            Download the installer for your platform below.

            - **First install:** [Download page](https://iamthamanic.github.io/scriptony-multihost/) or pick `.dmg` / `.msi` / `.exe` / `.AppImage` from Assets
            - **Updates:** installed apps check automatically via Settings → System

            See [docs/DESKTOP_RELEASE.md](https://github.com/iamthamanic/scriptony-multihost/blob/main/docs/DESKTOP_RELEASE.md) for maintainer notes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
