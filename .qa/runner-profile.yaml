# ECC Runner + feature-intake profile (scriptony-multihost)

issueBackend: github

github:
  defaultLabels: []
  milestone: null

stackProfile: scriptony-desktop

locale: de

runtimeAxes:
  - local-desktop
  - cloud-session
  - appwrite-functions

